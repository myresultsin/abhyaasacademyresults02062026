<style>

  body{

  .brand{text-align:center;margin-bottom:26px;}

  }
  .brand .collab{color:#93a0b8;font-size:0.85rem;margin-top:14px;letter-spacing:0.3px;}
  .brand h2{
    font-family:'Sora',sans-serif;

    margin-top:4px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));

    color:transparent;
  }
  .brand .location{color:var(--accent2);font-size:0.82rem;margin-top:4px;font-weight:500;}

  .btn-search{background:var(--accent);color:#fff;}
  .btn-search:hover{background:#5b4bd6;}
  .btn-print{background:var(--ink);color:#fff;}
  .btn-print:hover{background:#000;}
  .error{
    display:none;
    margin-top:14px;
    padding:10px 12px;
    border-radius:10px;
    background:rgba(224,69,79,0.08);

  .result-header{display:flex;align-items:center;gap:14px;padding-bottom:18px;border-bottom:1px solid var(--border);}
  .avatar{

  .result-header .rmeta{color:var(--muted);font-size:0.85rem;margin-top:2px;}
  .subject-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    margin-top:20px;
  }
  .subject-box{
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px 18px;
  }
  .subject-box .label{color:var(--muted);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;}
  .subject-box .value{font-family:'Sora',sans-serif;font-weight:800;font-size:1.6rem;color:var(--ink);margin-top:4px;}
  .subject-box .maxline{color:var(--muted);font-size:0.78rem;margin-top:2px;}
  .result-strip{
    margin-top:14px;
    border-radius:14px;
    padding:16px 18px;
    color:#fff;
  }
  .result-strip.PASS{background:var(--pass);}
  .result-strip.NC{background:var(--nc);}
  .result-strip.ABSENT{background:var(--absent);}
  .result-strip.PENDING{background:var(--pending);}
  .result-strip .label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;opacity:0.9;}
  .result-strip .value{font-family:'Sora',sans-serif;font-weight:800;font-size:1.4rem;margin-top:2px;}
  .back-link{
    display:block;text-align:center;margin-top:18px;color:var(--muted);
    font-size:0.85rem;font-weight:600;cursor:pointer;text-decoration:underline;
  }
  .footer{text-align:center;margin-top:28px;color:#8892a8;font-size:0.8rem;}

    body{background:#fff;color:#000;padding:0;}
    .brand, .footer{color:#000;}
    .brand h1{color:#000;}
    .badge-pill{border-color:#000;color:#000;background:none;}
    .search-row, .back-link{display:none !important;}
    .card{box-shadow:none;border:1px solid #ccc;}

</style>

function initials(name){
  const parts = name.trim().split(/\s+/);
  let out = parts[0][0];
  if(parts.length > 1) out += parts[1][0];
  return out.toUpperCase();
}

function lookupResult(){
  const val = document.getElementById('rollInput').value.trim().toUpperCase();
  const errBox = document.getElementById('errorMsg');
  errBox.style.display = 'none';
  if(!val){
    errBox.textContent = 'Please enter your Register Number.';
    errBox.style.display = 'block';
    return;
  }
  const student = students.find(s => s.roll.toUpperCase() === val);
  if(!student){
    document.getElementById('resultPanel').style.display = 'none';
    document.getElementById('printBtn').style.display = 'none';
    errBox.textContent = 'No record found for this Register Number. Please check and try again.';
    errBox.style.display = 'block';
    return;
  }
  showResult(student);
}

function showResult(student){
  document.getElementById('rAvatar').textContent = initials(student.name);
  document.getElementById('rName').textContent = student.name;
  document.getElementById('rMeta').textContent = 'Roll No. ' + student.roll + ' \u00b7 Class 10 \u00b7 ' + student.section;

  const grid = document.getElementById('subjectGrid');
  grid.innerHTML = '';

  let allAbsent = true;
  let allComplete = true;
  let anyFail = false;

  student.subjects.forEach(sub => {
    const isAbsent = (typeof sub.marks === 'string' && sub.marks.toUpperCase() === 'AB');
    if(!isAbsent) allAbsent = false;
    if(isAbsent || sub.marks === null || sub.marks === undefined || sub.marks === '') allComplete = false;

    const box = document.createElement('div');
    box.className = 'subject-box';
    const valueText = isAbsent ? 'AB' : sub.marks;
    box.innerHTML = '<div class="label">' + sub.name + '</div>' +
                     '<div class="value">' + valueText + (isAbsent ? '' : ' / ' + sub.max) + '</div>' +
                     '<div class="maxline">Max marks: ' + sub.max + '</div>';
    grid.appendChild(box);

    if(!isAbsent && typeof sub.marks === 'number'){
      const pct = (sub.marks / sub.max) * 100;
      if(pct < PASS_PERCENT) anyFail = true;
    }
  });

  let status;
  if(allAbsent){
    status = 'ABSENT';
  } else if(!allComplete){
    status = 'PENDING';
  } else if(anyFail){
    status = 'NC';
  } else {
    status = 'PASS';
  }

  const labels = {PASS:'PASS', NC:'NOT COMPLETED', ABSENT:'ABSENT', PENDING:'PENDING'};
  const strip = document.getElementById('resultStrip');
  strip.className = 'result-strip ' + status;
  document.getElementById('resultValue').textContent = labels[status];

  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('printBtn').style.display = 'inline-block';
}

function resetForm(){
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('printBtn').style.display = 'none';
  document.getElementById('rollInput').value = '';
  document.getElementById('errorMsg').style.display = 'none';
}

document.getElementById('rollInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') lookupResult();
});
